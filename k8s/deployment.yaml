apiVersion: apps/v3
kind: Deployment

metadata:
  name: reddy-nginx

spec:
  replicas: 2

  selector:
    matchLabels:
      app: reddy-nginx

  template:
    metadata:
      labels:
        app: reddy-nginx

    spec:
      containers:
      - name: reddy-nginx
        image: reddy-nginx:v3

        ports:
        - containerPort: 80
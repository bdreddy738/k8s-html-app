apiVersion: apps/v1
kind: Deployment

metadata:
  name: reddy-nginx

spec:
  replicas: 2

  selector:
    matchLabels:
      app: reddy-nginx

  template:
    metadata:
      labels:
        app: reddy-nginx

    spec:
      containers:
      - name: reddy-nginx
        image: reddy-nginx:v3

        ports:
        - containerPort: 80

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"

          limits:
            memory: "128Mi"
            cpu: "200m"

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5